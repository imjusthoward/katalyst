name: Dependabot Updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        if: github.actor == 'dependabot[bot]'
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"